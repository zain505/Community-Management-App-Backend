services:
  mysql:
    image: mysql:8.4
    container_name: community-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
      MYSQL_USER: community
      MYSQL_PASSWORD: community
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-ucommunity', '-pcommunity']
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: community-adminer
    restart: unless-stopped
    depends_on:
      - mysql
    ports:
      - '8080:8080'

volumes:
  mysql_data:
